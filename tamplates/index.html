<!DOCTYPE html>
<html>
<head>
    <title>Smartphone Addiction Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding-top: 40px;
        }

        .container {
            width: 400px;
            background: white;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }

        button {
            padding: 12px 25px;
            background: #0078D7;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        h1 {
            color: #333;
        }

        h2 {
            color: green;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Smartphone Addiction ML Prediction</h1>

    <form action="/predict" method="post">

        <input type="number" name="age" placeholder="Age" required>

        <input type="number" name="gender" placeholder="Gender (0 Female, 1 Male)" required>

        <input type="number" step="0.1" name="screen_time" placeholder="Daily Screen Time" required>

        <input type="number" step="0.1" name="social_media" placeholder="Social Media Hours" required>

        <input type="number" step="0.1" name="gaming" placeholder="Gaming Hours" required>

        <input type="number" step="0.1" name="work" placeholder="Work/Study Hours" required>

        <input type="number" step="0.1" name="sleep" placeholder="Sleep Hours" required>

        <input type="number" name="notifications" placeholder="Notifications Per Day" required>

        <input type="number" name="app_opens" placeholder="App Opens Per Day" required>

        <button type="submit">Predict</button>

    </form>

    <h2>{{ prediction_text }}</h2>
    <h2>Smartphone Addiction Prediction</h2>

<h3>Decision Tree Accuracy: 100%</h3>

<h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
